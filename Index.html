<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Funding Circle — SaaS Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f3; --surface: #ffffff; --surface2: #f0f0ee;
      --border: rgba(0,0,0,0.09); --border-strong: rgba(0,0,0,0.15);
      --text: #1a1a18; --text2: #5a5a56; --text3: #9a9a94;
      --ok: #0F6E56; --ok-bg: #EAF3DE; --ok-dot: #1D9E75;
      --warn: #854F0B; --warn-bg: #FAEEDA; --warn-dot: #EF9F27;
      --inc: #A32D2D; --inc-bg: #FCEBEB; --inc-dot: #E24B4A;
      --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816; --surface: #222220; --surface2: #2a2a28;
        --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
        --text: #f0f0ec; --text2: #9a9a94; --text3: #5a5a56;
        --ok: #7dc98f; --ok-bg: #162a1e; --ok-dot: #7dc98f;
        --warn: #e8b84b; --warn-bg: #2e2410; --warn-dot: #e8b84b;
        --inc: #e87070; --inc-bg: #2e1414; --inc-dot: #e87070;
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2.5rem 1rem; }
    .container { max-width: 860px; margin: 0 auto; }

    /* Header */
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-text { font-size: 16px; font-weight: 500; color: var(--text); }
    .brand-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .ts { font-size: 12px; color: var(--text3); }
    .refresh-btn { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text2); background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-md); padding: 7px 13px; cursor: pointer; transition: color 0.15s; }
    .refresh-btn:hover { color: var(--text); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Summary */
    .summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 2rem; }
    .sum { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; display: flex; align-items: center; justify-content: space-between; }
    .sum-num { font-size: 26px; font-weight: 500; line-height: 1; }
    .sum-num.ok { color: var(--ok); } .sum-num.warn { color: var(--warn); } .sum-num.inc { color: var(--inc); }
    .sum-label { font-size: 12px; color: var(--text3); margin-top: 3px; }
    .sum-pip { width: 10px; height: 10px; border-radius: 50%; }
    .sum-pip.ok { background: var(--ok-dot); } .sum-pip.warn { background: var(--warn-dot); } .sum-pip.inc { background: var(--inc-dot); }

    /* Sections */
    .section-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin: 1.75rem 0 8px; display: flex; align-items: center; gap: 6px; }
    .group-indent { border-left: 2px solid var(--border-strong); margin-left: 6px; padding-left: 14px; }

    /* Grid */
    .grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 4px; }

    /* Cards */
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
    .card:hover { border-color: var(--border-strong); }
    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .app-row { display: flex; align-items: center; gap: 9px; }
    .logo { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.02em; }
    .app-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .app-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap; }
    .badge-ok { background: var(--ok-bg); color: var(--ok); }
    .badge-warn { background: var(--warn-bg); color: var(--warn); }
    .badge-incident { background: var(--inc-bg); color: var(--inc); }
    .badge-loading, .badge-unknown { background: var(--surface2); color: var(--text3); }
    .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok { background: var(--ok-dot); } .dot-warn { background: var(--warn-dot); } .dot-incident { background: var(--inc-dot); } .dot-loading, .dot-unknown { background: var(--border-strong); }
    .divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }
    .incident-banner { font-size: 11px; color: var(--inc); background: var(--inc-bg); padding: 5px 9px; border-radius: var(--radius-md); margin-bottom: 10px; }
    .comps { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .comp { background: var(--surface2); border-radius: var(--radius-md); padding: 7px 9px; }
    .comp-name { font-size: 11px; color: var(--text2); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .comp-status { display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; }
    .comp-status.ok { color: var(--ok); } .comp-status.warn { color: var(--warn); } .comp-status.incident { color: var(--inc); } .comp-status.loading, .comp-status.unknown { color: var(--text3); }
    .card-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
    .view-link { font-size: 11px; color: var(--text3); }
    .no-live { font-size: 11px; color: var(--text3); font-style: italic; }
    .error-bar { background: var(--inc-bg); color: var(--inc); border: 0.5px solid var(--inc); border-radius: var(--radius-md); padding: 10px 14px; font-size: 13px; margin-bottom: 1rem; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 0.8s linear infinite; }
    footer { margin-top: 2.5rem; text-align: center; font-size: 12px; color: var(--text3); padding-top: 1rem; border-top: 0.5px solid var(--border); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <a class="brand" href="https://www.fundingcircle.com/uk/" target="_blank">
      <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABwAAAAcCAYAAAByDd+UAAABCGlDQ1BJQ0MgUHJvZmlsZQAAeJxjYGA8wQAELAYMDLl5JUVB7k4KEZFRCuwPGBiBEAwSk4sLGHADoKpv1yBqL+viUYcLcKakFicD6Q9ArFIEtBxopAiQLZIOYWuA2EkQtg2IXV5SUAJkB4DYRSFBzkB2CpCtkY7ETkJiJxcUgdT3ANk2uTmlyQh3M/Ck5oUGA2kOIJZhKGYIYnBncAL5H6IkfxEDg8VXBgbmCQixpJkMDNtbGRgkbiHEVBYwMPC3MDBsO48QQ4RJQWJRIliIBYiZ0tIYGD4tZ2DgjWRgEL7AwMAVDQsIHG5TALvNnSEfCNMZchhSgSKeDHkMyQx6QJYRgwGDIYMZAKbWPz9HbOBQAAAEAUlEQVR42q2WT0xcVRTGf/e++96bGSh/plAxtAnRSkUExAhYTYxgTExctEYTExetf2pX3ZnYyEI3Epc2sat2Y9y4samm21riTrGr0pKI7cYuRBn+FZiBee/d4+LNTBkovNfYe1fzcr/z3XO/c745ChC2LFXZFgtAjz/ISOY1jngDdDpdLNkC44UTrNtVFArZAt+O7fOHGc6M0e310WEOcc8uY7aTSWX3+y/y1r4P6PEG8ckSUEbEktcHyKoc66yyG/aFzCsca3yfbq8fD4+QkFAC2nXHfcIqwFUeHzZ/yhsN74JASdZrwQ0GS1iXVYzVCJasbuDj5nHGcsexElGSdQLKtcwjopiwStaomzibP8eg/xLLdhEQNA4avYVEPSAzS6vTxmf5b+jxBlmxC5VraNSW8wqFqbK7yuNs/hwD/lEW7TwGl6QVk0FONzCeP0+318dSAlZXRT7Z/AmD/sss20Iqsq3ZnW4e52nvOVbsYiJWWyzP+kO82fDeQ5EBREQMZ0cZzR1n2S6kwmqF4u19pxAR0q9YF6MM7zSeJpBynVZ7EnZ7/fS4z1OUNTROOhAagF5/iMNuLxtSrH1LxB7Nvo6vMjtKPU2Gw5lRHGUeCmuOeAOElAH2BMqWbQkBeNJ9hkA2dzjOXjHMQfMEVgRTbzoPOAwOGk/5RFgyKkeHcwgRi4NJUFDFPa00ZiH6h1anDSvRjqbefjtXuRSiOTZsEQUs2XkcxyGQIKFoBK0MS+E8ylWeZFQ21ZMoFJuyQVk2AXCVTyal/grFhpTid6xqQ8It2aFV/CsdtkL89YFLktftREQJEMHgUbBzjM+fAOCr9u/YrzsI2bsPY/2d2DI7TVeifvcJDXndjlKx/7bqdrIqS4iXovGFTtOFKVfKOrmkLa5y+Tv8i5JdB2Auustht5coZYxQwtja0mypFMmdYKYW4E4wg6t8BCFtHJ3eWxSRhEyVJmvfpjYmsRKm9tHYFlMsW2n028EtbpWv1257c/N3bgczZFS2Nsc8EsLq6PHD2kUiCVFoFJpIQi6tXcRTPvKoCEMCWnSeyeJPTJWuodFYIiwRGs2vpZ+ZLF2hRe8nJPh/hCEBzTrPH8ENLqxMVIYlqctcoriw/CWzwTRNOp9IqnfTLCKiVbcxG0wzsXCGol2reVK9z8C6XWVi4Qy3g5u06jYiol011VVQ/LdjEYScaqRJt3C1eJkvCqdYiuZ3ZFefpWYx+pfPCx9xtXiZJt1CTjXWxayd/f7xKQHBKBeDoUyZP8vT/Lj2Ldc3fqmbWZMHqvjMUPZVjjWc5Cmvr24QVijU+ceuSJNuYS68y2xwg99K15jenKqNErLtGZNI60f9EUayY3S7/XSYg9yzy/wHzyjMocZsKF0AAAAASUVORK5CYII=" alt="Funding Circle logo" width="28" height="28">
      <div>
        <div class="brand-text">Funding Circle</div>
        <div class="brand-sub">SaaS status dashboard</div>
      </div>
    </a>
    <div class="header-right">
      <span class="ts" id="last-updated">Fetching status…</span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
        <span id="refresh-icon">↻</span> Refresh
      </button>
    </div>
  </header>

  <div class="summary">
    <div class="sum"><div><div class="sum-num ok" id="sum-ok">—</div><div class="sum-label">Operational</div></div><div class="sum-pip ok"></div></div>
    <div class="sum"><div><div class="sum-num warn" id="sum-warn">—</div><div class="sum-label">Degraded</div></div><div class="sum-pip warn"></div></div>
    <div class="sum"><div><div class="sum-num inc" id="sum-inc">—</div><div class="sum-label">Incident</div></div><div class="sum-pip inc"></div></div>
  </div>

  <div class="error-bar" id="error-bar"></div>
  <div id="cards"></div>
  <footer>Auto-refreshes every 2 minutes &nbsp;·&nbsp; Click any card to open its status page</footer>
</div>

<script>
const WORKER_URL = "https://dawn-violet-693a.manish-parekh.workers.dev";

const SECTIONS = [
  {
    label: "Identity & comms", icon: "shield-lock", indent: false,
    apps: [
      { id:"okta",  name:"Okta",  logo:"🔐", logoBg:"#00297A", logoColor:"#fff", meta:"status.okta.com",  statusPageUrl:"https://status.okta.com",  defaultComps:["Core Service","SSO","MFA","Admin Console"] },
      { id:"slack", name:"Slack", logo:"💬", logoBg:"#4A154B", logoColor:"#fff", meta:"slack-status.com", statusPageUrl:"https://slack-status.com", defaultComps:["Login/SSO","Connectivity","Messaging","Notifications"] },
    ]
  },
  {
    label: "Atlassian", icon: "building", indent: true,
    apps: [
      { id:"jira",       name:"Jira",       logo:"J", logoBg:"#0052CC", logoColor:"#fff", meta:"↳ Atlassian", statusPageUrl:"https://status.atlassian.com", defaultComps:["Software","Service Mgmt","Work Mgmt","Automation"] },
      { id:"confluence", name:"Confluence", logo:"C", logoBg:"#0065FF", logoColor:"#fff", meta:"↳ Atlassian", statusPageUrl:"https://status.atlassian.com", defaultComps:["Page editing","Spaces","Search","Integrations"] },
    ]
  },
  {
    label: "AI tools", icon: "sparkles", indent: true,
    apps: [
      { id:"gemini", name:"Google Gemini", logo:"✦", logoBg:"#1A73E8", logoColor:"#fff", meta:"↳ AI tools", statusPageUrl:"https://status.cloud.google.com", defaultComps:["Gemini app","Gemini API","Extensions","Advanced"] },
      { id:"claude", name:"Claude",        logo:"◆", logoBg:"#CC785C", logoColor:"#fff", meta:"↳ AI tools", statusPageUrl:"https://status.anthropic.com",    defaultComps:["claude.ai","API","iOS app","Android app"] },
    ]
  },
  {
    label: "Infrastructure", icon: "server", indent: true,
    apps: [
      { id:"github", name:"GitHub", logo:"GH",  logoBg:"#24292F", logoColor:"#fff",    meta:"↳ Infrastructure", statusPageUrl:"https://githubstatus.com",        defaultComps:["Git Operations","API Requests","Actions","Pull Requests"] },
      { id:"aws",    name:"AWS",    logo:"AWS",  logoBg:"#232F3E", logoColor:"#FF9900", meta:"↳ Infrastructure", statusPageUrl:"https://status.aws.amazon.com",   defaultComps:["EC2 (EU)","S3 (EU)","RDS (EU)","CloudFront"] },
    ]
  },
  {
    label: "Microsoft", icon: "building", indent: true,
    apps: [
      { id:"azure",  name:"Azure",         logo:"Az", logoBg:"#0078D4", logoColor:"#fff", meta:"↳ Microsoft", statusPageUrl:"https://status.azure.com",       defaultComps:["Compute","Storage","Networking","Azure AD"] },
      { id:"office", name:"Microsoft 365", logo:"M",  logoBg:"#D83B01", logoColor:"#fff", meta:"↳ Microsoft", statusPageUrl:"https://status.office365.com",   defaultComps:["Exchange","Teams","SharePoint","OneDrive"], noLive:true },
    ]
  },
  {
    label: "Productivity", icon: "apps", indent: false,
    apps: [
      { id:"hibob",  name:"HiBob",            logo:"HB", logoBg:"#FF5A5F", logoColor:"#fff", meta:"status.hibob.com",            statusPageUrl:"https://status.hibob.com",            defaultComps:["Core HR","Payroll","Time & Attendance","Integrations"], noLive:true },
      { id:"google", name:"Google Workspace", logo:"G",  logoBg:"#4285F4", logoColor:"#fff", meta:"workspace.google.com/status", statusPageUrl:"https://workspace.google.com/status", defaultComps:["Gmail","Drive","Meet","Calendar"], noLive:true },
    ]
  },
];

function lbl(s) {
  return s==="ok"?"Operational":s==="warn"?"Degraded":s==="incident"?"Incident":s==="unknown"?"Check manually":"Loading…";
}

function cardHtml(app, data) {
  const overall = data?.overall || "loading";
  const comps = (data?.noApi || !data?.components?.length)
    ? app.defaultComps.map(n => ({ name:n, status: data?.noApi ? "unknown" : "loading" }))
    : data.components;
  return `<div class="card" id="card-${app.id}" onclick="window.open('${app.statusPageUrl}','_blank')">
    <div class="card-top">
      <div class="app-row">
        <div class="logo" style="background:${app.logoBg};color:${app.logoColor}">${app.logo}</div>
        <div><div class="app-name">${app.name}</div><div class="app-meta">${app.meta}</div></div>
      </div>
      <span class="badge badge-${overall}"><span class="dot dot-${overall}"></span>${lbl(overall)}</span>
    </div>
    ${data?.incident ? `<div class="incident-banner">⚠ ${data.incident}</div>` : ""}
    <hr class="divider">
    <div class="comps">
      ${comps.map(c => `<div class="comp"><div class="comp-name" title="${c.name}">${c.name}</div><div class="comp-status ${c.status}"><span class="dot dot-${c.status}"></span>${lbl(c.status)}</div></div>`).join("")}
    </div>
    <div class="card-foot">
      <span class="view-link">↗ ${app.statusPageUrl.replace("https://","")}</span>
      ${data?.noApi ? '<span class="no-live">No public API</span>' : ""}
    </div>
  </div>`;
}

function renderAll(services) {
  let html = "";
  SECTIONS.forEach(sec => {
    html += `<div class="section-label"><i class="ti ti-${sec.icon}" aria-hidden="true" style="font-size:11px;"></i> ${sec.label}</div>`;
    const grid = `<div class="grid">${sec.apps.map(app => cardHtml(app, services[app.id] || null)).join("")}</div>`;
    html += sec.indent ? `<div class="group-indent">${grid}</div>` : grid;
  });
  document.getElementById("cards").innerHTML = html;
}

function updateSummary(services) {
  let ok=0, warn=0, inc=0;
  SECTIONS.forEach(sec => sec.apps.forEach(app => {
    const d = services[app.id];
    if (!d || d.noApi) return;
    if (d.overall==="ok") ok++;
    else if (d.overall==="warn") warn++;
    else if (d.overall==="incident") inc++;
  }));
  document.getElementById("sum-ok").textContent = ok;
  document.getElementById("sum-warn").textContent = warn;
  document.getElementById("sum-inc").textContent = inc;
}

async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  const icon = document.getElementById("refresh-icon");
  btn.disabled = true; icon.classList.add("spinning");
  document.getElementById("error-bar").style.display = "none";
  document.getElementById("last-updated").textContent = "Fetching status…";
  renderAll({});
  try {
    const res = await fetch(WORKER_URL, { signal: AbortSignal.timeout(15000) });
    if (!res.ok) throw new Error("Worker returned " + res.status);
    const data = await res.json();
    const services = data.services || {};
    renderAll(services);
    updateSummary(services);
    const ts = data.timestamp ? new Date(data.timestamp) : new Date();
    document.getElementById("last-updated").textContent =
      "Last updated: " + ts.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
  } catch(e) {
    const bar = document.getElementById("error-bar");
    bar.textContent = "Could not reach the status worker. Check your Worker URL and try again.";
    bar.style.display = "block";
    document.getElementById("last-updated").textContent = "Failed to load";
  }
  btn.disabled = false; icon.classList.remove("spinning");
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
