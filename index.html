<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Status Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface2: #f0f0ee;
      --border: rgba(0,0,0,0.09);
      --border-strong: rgba(0,0,0,0.15);
      --text: #1a1a18;
      --text2: #5a5a56;
      --text3: #9a9a94;
      --ok: #2d7a4f;
      --ok-bg: #eaf3de;
      --warn: #8a5c00;
      --warn-bg: #faeeda;
      --inc: #a32d2d;
      --inc-bg: #fcebeb;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #181816;
        --surface: #222220;
        --surface2: #2a2a28;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);
        --text: #f0f0ec;
        --text2: #9a9a94;
        --text3: #5a5a56;
        --ok: #7dc98f;
        --ok-bg: #162a1e;
        --warn: #e8b84b;
        --warn-bg: #2e2410;
        --inc: #e87070;
        --inc-bg: #2e1414;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container { max-width: 780px; margin: 0 auto; }

    header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 2rem;
    }
    .header-left h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
    .header-left p { font-size: 13px; color: var(--text3); margin-top: 3px; }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text2);
      background: var(--surface); border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md); padding: 7px 14px; cursor: pointer;
      transition: color 0.15s;
    }
    .refresh-btn:hover { color: var(--text); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .summary-bar {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; margin-bottom: 1.75rem;
    }
    .sum-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .sum-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .sum-icon.ok   { background: var(--ok-bg); }
    .sum-icon.warn { background: var(--warn-bg); }
    .sum-icon.inc  { background: var(--inc-bg); }
    .sum-num { font-size: 22px; font-weight: 600; line-height: 1; }
    .sum-num.ok   { color: var(--ok); }
    .sum-num.warn { color: var(--warn); }
    .sum-num.inc  { color: var(--inc); }
    .sum-label { font-size: 12px; color: var(--text3); margin-top: 2px; }

    .last-updated { font-size: 12px; color: var(--text3); margin-bottom: 1rem; }

    .group-label {
      font-size: 11px; font-weight: 600; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin: 1.75rem 0 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .group-indent {
      border-left: 2px solid var(--border-strong);
      margin-left: 6px; padding-left: 14px;
    }

    .app-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .app-card:hover { border-color: var(--border-strong); }

    .app-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 12px;
    }
    .app-name-row { display: flex; align-items: center; gap: 10px; }
    .app-logo {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0; letter-spacing: -0.02em;
    }
    .app-name { font-size: 15px; font-weight: 500; }
    .app-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 999px;
      font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .badge-ok       { background: var(--ok-bg);   color: var(--ok); }
    .badge-warn     { background: var(--warn-bg);  color: var(--warn); }
    .badge-incident { background: var(--inc-bg);   color: var(--inc); }
    .badge-loading, .badge-unknown { background: var(--surface2); color: var(--text3); }

    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-ok       { background: var(--ok); }
    .dot-warn     { background: var(--warn); }
    .dot-incident { background: var(--inc); }
    .dot-loading, .dot-unknown { background: var(--border-strong); }

    .divider { border: none; border-top: 0.5px solid var(--border); margin: 10px 0; }

    .incident-banner {
      font-size: 12px; color: var(--inc);
      background: var(--inc-bg); padding: 7px 10px;
      border-radius: var(--radius-md); margin-bottom: 10px;
    }

    .components {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
      gap: 8px;
    }
    .comp { background: var(--surface2); border-radius: var(--radius-md); padding: 8px 10px; }
    .comp-name { font-size: 12px; color: var(--text2); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .comp-status { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; }
    .comp-status.ok       { color: var(--ok); }
    .comp-status.warn     { color: var(--warn); }
    .comp-status.incident { color: var(--inc); }
    .comp-status.loading, .comp-status.unknown { color: var(--text3); }

    .card-footer {
      display: flex; align-items: center;
      justify-content: space-between; margin-top: 10px;
    }
    .view-link { font-size: 12px; color: var(--text3); text-decoration: none; }
    .no-live { font-size: 11px; color: var(--text3); font-style: italic; }

    .error-bar {
      background: var(--inc-bg); color: var(--inc);
      border: 0.5px solid var(--inc);
      border-radius: var(--radius-md); padding: 10px 14px;
      font-size: 13px; margin-bottom: 1rem; display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 0.8s linear infinite; }

    footer {
      margin-top: 2.5rem; text-align: center;
      font-size: 12px; color: var(--text3);
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>SaaS status dashboard</h1>
      <p id="last-updated">Fetching status…</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
      <span id="refresh-icon">↻</span> Refresh
    </button>
  </header>

  <div class="summary-bar">
    <div class="sum-card">
      <div class="sum-icon ok">✓</div>
      <div><div class="sum-num ok" id="sum-ok">—</div><div class="sum-label">Operational</div></div>
    </div>
    <div class="sum-card">
      <div class="sum-icon warn">⚠</div>
      <div><div class="sum-num warn" id="sum-warn">—</div><div class="sum-label">Degraded</div></div>
    </div>
    <div class="sum-card">
      <div class="sum-icon inc">✕</div>
      <div><div class="sum-num inc" id="sum-inc">—</div><div class="sum-label">Incident</div></div>
    </div>
  </div>

  <div class="error-bar" id="error-bar"></div>
  <div id="last-updated-bar" class="last-updated"></div>
  <div id="cards"></div>

  <footer>Auto-refreshes every 2 minutes &nbsp;·&nbsp; Click any card to open its status page</footer>
</div>

<script>
const APPS = [
  { id:'okta',       name:'Okta',             logo:'🔐', logoBg:'#00297A', logoColor:'#fff',    meta:'status.okta.com',              statusPageUrl:'https://status.okta.com',               defaultComps:['Core Service','SSO','MFA','Admin Console'] },
  { id:'slack',      name:'Slack',            logo:'💬', logoBg:'#4A154B', logoColor:'#fff',    meta:'status.slack.com',             statusPageUrl:'https://status.slack.com',              defaultComps:['Messaging','Connections','Notifications','API'] },
  { id:'jira',       name:'Jira',             logo:'J',  logoBg:'#0052CC', logoColor:'#fff',    meta:'Atlassian',                    statusPageUrl:'https://status.atlassian.com',          defaultComps:['Software','Service Mgmt','Work Mgmt','Automation'],   group:'Atlassian' },
  { id:'confluence', name:'Confluence',       logo:'C',  logoBg:'#0065FF', logoColor:'#fff',    meta:'Atlassian',                    statusPageUrl:'https://status.atlassian.com',          defaultComps:['Page editing','Spaces','Search','Integrations'],      group:'Atlassian' },
  { id:'github',     name:'GitHub',           logo:'GH', logoBg:'#24292F', logoColor:'#fff',    meta:'githubstatus.com',             statusPageUrl:'https://githubstatus.com',              defaultComps:['Git Operations','API Requests','Actions','Pull Requests'] },
  { id:'aws',        name:'AWS',              logo:'AWS',logoBg:'#232F3E', logoColor:'#FF9900', meta:'status.aws.amazon.com',        statusPageUrl:'https://status.aws.amazon.com',         defaultComps:['EC2','S3','RDS','CloudFront'] },
  { id:'azure',      name:'Azure',            logo:'Az', logoBg:'#0078D4', logoColor:'#fff',    meta:'status.azure.com',             statusPageUrl:'https://status.azure.com',              defaultComps:['Compute','Storage','Networking','Azure AD'],          group:'Microsoft' },
  { id:'office',     name:'Microsoft 365',    logo:'M',  logoBg:'#D83B01', logoColor:'#fff',    meta:'portal.office.com',            statusPageUrl:'https://status.office365.com',          defaultComps:['Exchange','Teams','SharePoint','OneDrive'],           group:'Microsoft' },
  { id:'hibob',      name:'HiBob',            logo:'HB', logoBg:'#FF5A5F', logoColor:'#fff',    meta:'status.hibob.com',             statusPageUrl:'https://status.hibob.com',              defaultComps:['Core HR','Payroll','Time & Attendance','Integrations'], noLive:true },
  { id:'google',     name:'Google Workspace', logo:'G',  logoBg:'#4285F4', logoColor:'#fff',    meta:'workspace.google.com/status',  statusPageUrl:'https://workspace.google.com/status',   defaultComps:['Gmail','Drive','Meet','Calendar'],                       noLive:true },
  { id:'gemini',     name:'Google Gemini',    logo:'✦',  logoBg:'#1A73E8', logoColor:'#fff',    meta:'status.cloud.google.com',      statusPageUrl:'https://status.cloud.google.com',       defaultComps:['Gemini app','Gemini API','Extensions','Advanced'],       noLive:true, group:'AI tools' },
  { id:'claude',     name:'Claude',           logo:'◆',  logoBg:'#CC785C', logoColor:'#fff',    meta:'status.anthropic.com',         statusPageUrl:'https://status.anthropic.com',          defaultComps:['claude.ai','API','iOS app','Android app'],               group:'AI tools' },
];

const GROUP_ICONS = { 'Atlassian': '🏢', 'Microsoft': '🪟', 'AI tools': '✨' };

function label(s) {
  return s === 'ok' ? 'Operational' : s === 'warn' ? 'Degraded' : s === 'incident' ? 'Incident' : s === 'unknown' ? 'Check manually' : 'Loading…';
}

function classify(status = '') {
  const s = status.toLowerCase();
  if (['none','operational','good','all_systems_normal'].some(k => s.includes(k))) return 'ok';
  if (['degraded','partial','minor','maintenance','advisory','informational'].some(k => s.includes(k))) return 'warn';
  if (['major','outage','incident','disruption','critical'].some(k => s.includes(k))) return 'incident';
  return 'ok';
}

async function safeFetch(url) {
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch { return null; }
}

const fetchers = {
  async okta() {
    try {
      const proxy = 'https://corsproxy.io/?url=' + encodeURIComponent('https://status.okta.com/');
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      const html = await res.text();
      const match = html.match(/\[(\{"attributes":\{"type":"Incident__c"[\s\S]*?)\]\[\]/);
      if (!match) return null;
      const incidents = JSON.parse('[' + match[1] + ']');
      const active = incidents.filter(i => i.Status__c && i.Status__c !== 'Resolved');
      let overall = 'ok';
      if (active.length > 0) {
        const cats = active.map(i => (i.Category__c || '').toLowerCase());
        if (cats.some(c => c.includes('major') || c.includes('disruption'))) overall = 'incident';
        else overall = 'warn';
      }
      const incident = active[0]?.Incident_Title__c || null;
      const components = ['Core Service','SSO','MFA','Admin Console'].map(name => ({
        name, status: overall !== 'ok' ? overall : 'ok'
      }));
      return { overall, components, incident };
    } catch { return null; }
  },
  async slack() {
    try {
      const proxy = 'https://corsproxy.io/?url=' + encodeURIComponent('https://status.slack.com/api/v2.0.0/current');
      const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
      const d = await res.json();
      const hasInc = (d.active_incidents || []).length > 0;
      const overall = hasInc ? 'incident' : classify(d.status);
      const components = ['Messaging','Connections','Notifications','API'].map(name => ({ name, status: hasInc ? 'incident' : overall }));
      return { overall, components, incident: d.active_incidents?.[0]?.title || null };
    } catch { return null; }
  },
  _atlassian: null,
  async _getAtlassian() {
    if (!this._atlassian) this._atlassian = safeFetch('https://status.atlassian.com/api/v2/summary.json');
    return await this._atlassian;
  },
  async jira() {
    const d = await fetchers._getAtlassian();
    if (!d) return null;
    const overall = classify(d.status?.indicator);
    const raw = (d.components || []).filter(c => c.name?.toLowerCase().includes('jira')).slice(0,4);
    const components = raw.length
      ? raw.map(c => ({ name: c.name.replace(/^Jira\s?/i,'').trim() || c.name, status: classify(c.status) }))
      : ['Software','Service Mgmt','Work Mgmt','Automation'].map(name => ({ name, status: overall }));
    return { overall, components, incident: d.incidents?.[0]?.name || null };
  },
  async confluence() {
    const d = await fetchers._getAtlassian();
    if (!d) return null;
    const overall = classify(d.status?.indicator);
    const raw = (d.components || []).filter(c => c.name?.toLowerCase().includes('confluence')).slice(0,4);
    const components = raw.length
      ? raw.map(c => ({ name: c.name.replace(/^Confluence\s?/i,'').trim() || c.name, status: classify(c.status) }))
      : ['Page editing','Spaces','Search','Integrations'].map(name => ({ name, status: overall }));
    return { overall, components, incident: null };
  },
  async github() {
    const d = await safeFetch('https://www.githubstatus.com/api/v2/summary.json');
    if (!d) return null;
    const overall = classify(d.status?.indicator);
    const wanted = ['Git Operations','API Requests','Actions','Pull Requests'];
    const raw = (d.components || []).filter(c => wanted.some(w => c.name?.includes(w))).slice(0,4);
    const components = raw.length ? raw.map(c => ({ name: c.name, status: classify(c.status) })) : wanted.map(name => ({ name, status: overall }));
    return { overall, components, incident: d.incidents?.[0]?.name || null };
  },
  async aws() {
    const d = await safeFetch('https://status.aws.amazon.com/data.json');
    if (!d) return null;
    const events = d.current || [];
    const overall = events.length > 0 ? 'incident' : 'ok';
    const services = ['EC2','S3','RDS','CloudFront'];
    const components = services.map(name => ({ name, status: events.find(e => e.service?.toLowerCase().includes(name.toLowerCase())) ? 'incident' : 'ok' }));
    return { overall, components, incident: events[0]?.summary || null };
  },
  async azure() {
    // Azure status uses a summary JSON endpoint
    const d = await safeFetch('https://status.azure.com/en-us/status/feed/');
    // Fallback: try the status page API
    const d2 = await safeFetch('https://status.azure.com/api/v2/status.json');
    if (d2) {
      const overall = classify(d2.status?.indicator || 'none');
      const components = ['Compute','Storage','Networking','Azure AD'].map(name => ({ name, status: overall }));
      return { overall, components, incident: d2.incidents?.[0]?.name || null };
    }
    // Azure RSS fallback — if we got the feed, assume ok
    const overall = d ? 'ok' : null;
    if (!overall) return null;
    return {
      overall,
      components: ['Compute','Storage','Networking','Azure AD'].map(name => ({ name, status: overall })),
      incident: null
    };
  },
  async office() {
    // Microsoft 365 has a public status page but no unauthenticated JSON API.
    // We surface it as check-manually with a direct link.
    return { overall: 'unknown', components: [], incident: null, noApi: true };
  },
  async claude() {
    const d = await safeFetch('https://status.anthropic.com/api/v2/summary.json');
    if (!d) return null;
    const overall = classify(d.status?.indicator);
    const wanted = ['claude.ai','api','ios','android'];
    const raw = (d.components || []).filter(c => wanted.some(w => c.name?.toLowerCase().includes(w))).slice(0,4);
    const components = raw.length ? raw.map(c => ({ name: c.name, status: classify(c.status) })) : ['claude.ai','API','iOS app','Android app'].map(name => ({ name, status: overall }));
    return { overall, components, incident: d.incidents?.[0]?.name || null };
  },
  async hibob()  { return { overall:'unknown', components: [], incident: null, noApi: true }; },
  async google() { return { overall:'unknown', components: [], incident: null, noApi: true }; },
  async gemini() { return { overall:'unknown', components: [], incident: null, noApi: true }; },
};

const cache = {};

function cardHtml(app, data) {
  const overall = data?.overall || 'loading';
  const comps = (data?.noApi || !data?.components?.length)
    ? app.defaultComps.map(n => ({ name: n, status: data?.noApi ? 'unknown' : 'loading' }))
    : data.components;

  return `
    <div class="app-card" id="card-${app.id}" onclick="window.open('${app.statusPageUrl}','_blank')">
      <div class="app-header">
        <div class="app-name-row">
          <div class="app-logo" style="background:${app.logoBg};color:${app.logoColor}">${app.logo}</div>
          <div>
            <div class="app-name">${app.name}</div>
            <div class="app-meta">${app.group ? '↳ ' + app.group : app.meta}</div>
          </div>
        </div>
        <span class="badge badge-${overall}">
          <span class="dot dot-${overall}"></span>
          ${label(overall)}
        </span>
      </div>
      ${data?.incident ? `<div class="incident-banner">⚠ ${data.incident}</div>` : ''}
      <hr class="divider">
      <div class="components">
        ${comps.map(c => `
          <div class="comp">
            <div class="comp-name" title="${c.name}">${c.name}</div>
            <div class="comp-status ${c.status}">
              <span class="dot dot-${c.status}"></span>${label(c.status)}
            </div>
          </div>`).join('')}
      </div>
      <div class="card-footer">
        <span class="view-link">↗ ${app.statusPageUrl.replace('https://','')}</span>
        ${data?.noApi ? `<span class="no-live">No public API — check manually</span>` : ''}
      </div>
    </div>`;
}

function renderAll() {
  const container = document.getElementById('cards');
  let html = '';
  let currentGroup = null;
  APPS.forEach(app => {
    const g = app.group || null;
    if (g !== currentGroup) {
      if (currentGroup !== null) html += '</div>';
      if (g !== null) html += `<div class="group-label">${GROUP_ICONS[g] || '📁'} ${g}</div><div class="group-indent">`;
      currentGroup = g;
    }
    html += cardHtml(app, cache[app.id] ?? null);
  });
  if (currentGroup !== null) html += '</div>';
  container.innerHTML = html;
}

function updateSummary() {
  let ok = 0, warn = 0, inc = 0;
  APPS.forEach(app => {
    const d = cache[app.id];
    if (!d || d.noApi) return;
    if (d.overall === 'ok') ok++;
    else if (d.overall === 'warn') warn++;
    else if (d.overall === 'incident') inc++;
  });
  document.getElementById('sum-ok').textContent = ok;
  document.getElementById('sum-warn').textContent = warn;
  document.getElementById('sum-inc').textContent = inc;
}

async function loadAll() {
  fetchers._atlassian = null;
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.classList.add('spinning');
  document.getElementById('error-bar').style.display = 'none';
  document.getElementById('last-updated').textContent = 'Fetching status…';
  renderAll();

  let anyError = false;
  await Promise.all(APPS.map(async app => {
    try {
      const data = await fetchers[app.id]();
      cache[app.id] = data;
    } catch {
      anyError = true;
      cache[app.id] = null;
    }
    const card = document.getElementById('card-' + app.id);
    if (card) {
      const tmp = document.createElement('div');
      tmp.innerHTML = cardHtml(app, cache[app.id]);
      card.replaceWith(tmp.firstElementChild);
    }
    updateSummary();
  }));

  if (anyError) {
    const bar = document.getElementById('error-bar');
    bar.textContent = 'Some services could not be reached. Results may be incomplete.';
    bar.style.display = 'block';
  }

  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Last updated: ' + now.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

  btn.disabled = false;
  icon.classList.remove('spinning');
}

loadAll();
setInterval(loadAll, 120000);
</script>
</body>
</html>
